<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Resource Platform</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">StudyShare</div>
    <div class="nav-links">
      <a href="#" onclick="showPage('home')">Home</a>
      <a href="#" onclick="showPage('browse')">Browse</a>
      <a href="#" id="uploadLink" onclick="showPage('upload')" style="display:none">Upload</a>
      <a href="#" id="adminLink"  onclick="showPage('admin')"  style="display:none">Admin</a>
      <a href="#" id="loginLink"  onclick="showPage('login')">Login</a>
      <a href="#" id="regLink"    onclick="showPage('register')">Register</a>
      <a href="#" id="logoutLink" onclick="logout()" style="display:none">Logout</a>
    </div>
  </nav>

  <div id="app">

    <!-- Home -->
    <div id="page-home" class="page active">
      <div class="hero">
        <h1>Share Knowledge, Ace Together</h1>
        <p>Upload and access study materials — notes, PDFs, and useful links.</p>
        <div class="hero-btns">
          <button onclick="showPage('browse')">Browse Resources</button>
          <button class="outline" onclick="showPage('upload')">Upload Material</button>
        </div>
      </div>
      <div class="stats" id="homeStats"></div>
    </div>

    <!-- Register -->
    <div id="page-register" class="page">
      <div class="form-card">
        <h2>Create Account</h2>
        <input type="text"     id="reg-name"     placeholder="Full Name" />
        <input type="email"    id="reg-email"    placeholder="Email" />
        <input type="password" id="reg-password" placeholder="Password" />
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="#" onclick="showPage('login')">Login</a></p>
        <p id="reg-msg" class="msg"></p>
      </div>
    </div>

    <!-- Login -->
    <div id="page-login" class="page">
      <div class="form-card">
        <h2>Login</h2>
        <input type="email"    id="login-email"    placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button onclick="login()">Login</button>
        <p>No account? <a href="#" onclick="showPage('register')">Register</a></p>
        <p id="login-msg" class="msg"></p>
      </div>
    </div>

    <!-- Upload -->
    <div id="page-upload" class="page">
      <div class="form-card">
        <h2>Upload Resource</h2>
        <input type="text" id="res-title"   placeholder="Title" />
        <textarea          id="res-desc"    placeholder="Description (optional)"></textarea>
        <input type="text" id="res-subject" placeholder="Subject (e.g. Mathematics)" />
        <select id="res-type" onchange="toggleLinkField()">
          <option value="pdf">PDF / Document</option>
          <option value="note">Note</option>
          <option value="link">External Link</option>
        </select>
        <div id="file-field">
          <input type="file" id="res-file" accept=".pdf,.doc,.docx,.txt,.ppt,.pptx" />
        </div>
        <div id="link-field" style="display:none">
          <input type="url" id="res-link" placeholder="https://..." />
        </div>
        <button onclick="uploadResource()">Upload</button>
        <p id="upload-msg" class="msg"></p>
      </div>
    </div>

    <!-- Browse -->
    <div id="page-browse" class="page">
      <div class="browse-header">
        <h2>Browse Resources</h2>
        <div class="filters">
          <input type="text" id="search-keyword" placeholder="Search keyword..." />
          <input type="text" id="filter-subject" placeholder="Subject..." />
          <select id="filter-type">
            <option value="">All Types</option>
            <option value="pdf">PDF / Doc</option>
            <option value="note">Note</option>
            <option value="link">Link</option>
          </select>
          <button onclick="loadResources()">Search</button>
        </div>
      </div>
      <div id="resources-grid" class="resources-grid"></div>
    </div>

    <!-- Admin -->
    <div id="page-admin" class="page">
      <h2>Admin Panel</h2>
      <div class="admin-tabs">
        <button onclick="adminTab('resources')">Resources</button>
        <button onclick="adminTab('users')">Users</button>
      </div>
      <div id="admin-content"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
